# app/camera_traps/babel.cfg — camera_traps submodule string extraction.
# Run from the BIOMON REPO ROOT:
#   pybabel extract -F app/camera_traps/babel.cfg -k _l -k lazy_gettext -o app/camera_traps/messages.pot .
# (extract НЕ має -D; домен camera_traps задається на update/compile через -D + ім'я .po)
#
# Default `_` (gettext) is built-in to pybabel.

[python: app/camera_traps/**.py]

[jinja2: app/camera_traps/templates/**.html]
extensions = jinja2.ext.i18n,jinja2.ext.do
